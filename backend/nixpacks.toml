[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_20"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction", "npm install -g @railway/cli"]

[phases.build]
cmds = ["php artisan config:clear", "php artisan route:clear"]

[start]
cmd = "mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs && php artisan config:clear && php artisan route:clear && php artisan migrate --force && (php artisan schedule:work >> storage/logs/scheduler.log 2>&1 &) && php artisan serve --host=0.0.0.0 --port=$PORT"
