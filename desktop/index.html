<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vibyra Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050508;
        --panel: #101014;
        --line: #252033;
        --text: #ffffff;
        --muted: #b8afca;
        --violet: #7b2cff;
        --pink: #ff35c8;
        --amber: #ffb84d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 50% 0%, rgba(123,44,255,.28), transparent 34%), var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { display: grid; min-height: 100vh; place-items: center; padding: 28px; }
      section {
        width: min(760px, 100%);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(16, 16, 20, .92);
        padding: 32px;
        text-align: center;
      }
      img { height: 220px; object-fit: contain; width: min(320px, 100%); }
      h1 { font-size: clamp(34px, 7vw, 64px); margin: -18px 0 6px; }
      p { color: var(--muted); font-size: 17px; font-weight: 700; line-height: 1.6; margin: 0; }
      a {
        color: var(--text);
        display: inline-flex;
        margin-top: 22px;
        padding: 13px 18px;
        text-decoration: none;
        border-radius: 10px;
        background: linear-gradient(120deg, var(--violet), var(--pink), var(--amber));
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <img src="/desktop/vibyra.png" alt="Vibyra" />
        <h1>Vibyra Desktop</h1>
        <p>Code. Create. Elevate. Keep this window open while your phone pairs with your coding workspace.</p>
        <a href="/desktop/state">Check Desktop State</a>
      </section>
    </main>
  </body>
</html>
