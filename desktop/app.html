    <script>
      (() => {
        const defaults = { appearance: "dark", chatFont: "vibyra-sans" };
        try {
          const prefs = JSON.parse(localStorage.getItem("vibyra.desktop.profilePreferences") || "{}") || {};
          const appearance = ["auto", "dark", "light"].includes(prefs.appearance) ? prefs.appearance : defaults.appearance;
          document.body.dataset.desktopTheme = appearance;
          document.body.dataset.chatFont = prefs.chatFont || defaults.chatFont;
        } catch {
          document.body.dataset.desktopTheme = defaults.appearance;
          document.body.dataset.chatFont = defaults.chatFont;
        }
      })();
    </script>
    <header class="desktop-chrome" aria-label="Vibyra Desktop title bar">
      <div class="desktop-chrome-drag">
        <span class="desktop-chrome-logo" aria-hidden="true"><img src="/app-assets/vibyra.png" alt="" /></span>
        <div class="desktop-chrome-copy">
          <h1>Vibyra Desktop</h1>
          <p id="desktop-chrome-status">Connected workspace</p>
        </div>
      </div>
      <div id="desktop-chrome-page" class="desktop-chrome-page"></div>
      <div class="desktop-chrome-right">
        <div id="desktop-chrome-actions" class="desktop-chrome-actions"></div>
        <div class="desktop-window-controls" aria-label="Window controls">
          <button type="button" data-window-action="minimize" aria-label="Minimize" title="Minimize"></button>
          <button type="button" data-window-action="maximize" aria-label="Maximize" title="Maximize"></button>
          <button type="button" data-window-action="close" aria-label="Close" title="Close"></button>
        </div>
      </div>
    </header>

          <form id="desktop-email-auth" class="email-auth" autocomplete="on">
            <div class="email-mode-row">
              <button class="email-mode active" data-auth-mode="signup" type="button">Sign up</button>
              <button class="email-mode" data-auth-mode="login" type="button">Log in</button>
            </div>
            <input id="desktop-auth-name" autocomplete="name" placeholder="Your name" />
            <input id="desktop-auth-email" autocomplete="email" inputmode="email" placeholder="Email address" />
            <input id="desktop-auth-password" autocomplete="new-password" placeholder="Password" type="password" />
            <p id="desktop-auth-error" class="auth-error"></p>
            <button id="desktop-auth-submit" class="email-submit" type="submit">Create account</button>
          </form>
          <div class="auth-legal">
            <p>By continuing, you agree to our</p>
            <div><button type="button" data-auth-link="privacy">Privacy Policy</button><span></span><button type="button" data-auth-link="terms">Terms of Service</button></div>
          </div>
