    <script>
      (() => {
        const defaults = { appearance: "dark", chatFont: "vibyra-sans" };
        try {
          const prefs = JSON.parse(localStorage.getItem("vibyra.desktop.profilePreferences") || "{}") || {};
          const appearance = ["auto", "dark", "light"].includes(prefs.appearance) ? prefs.appearance : defaults.appearance;
          document.body.dataset.desktopTheme = appearance;
          document.body.dataset.chatFont = prefs.chatFont || defaults.chatFont;
        } catch {
          document.body.dataset.desktopTheme = defaults.appearance;
          document.body.dataset.chatFont = defaults.chatFont;
        }
      })();
    </script>
