<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vibyra Desktop</title>
    <link rel="stylesheet" href="/desktop/assets/app.1.css" />
    <link rel="stylesheet" href="/desktop/assets/app.6.css" />
    <link rel="stylesheet" href="/desktop/assets/app.3.css" />
    <link rel="stylesheet" href="/desktop/assets/app.4.css" />
    <link rel="stylesheet" href="/desktop/assets/app.5.css" />
    <link rel="stylesheet" href="/desktop/assets/app.2.css" />
    <link rel="stylesheet" href="/desktop/assets/app.7.css" />
    <link rel="stylesheet" href="/desktop/assets/app.auth.css" />
  </head>
  <body>
    <section id="desktop-auth" class="desktop-auth" aria-label="Vibyra login">
      <img class="auth-bg" src="/app-assets/front-auth.jpg" alt="" />
      <div class="auth-overlay"></div>
      <div class="auth-content">
        <div class="auth-hero">
          <img class="auth-logo" src="/app-assets/vibyra.png" alt="Vibyra" />
          <div class="auth-title-row">
            <h1>Welcome to</h1>
            <span>Vibyra</span>
          </div>
        </div>
        <div class="auth-actions">
          <div class="auth-features" aria-label="Vibyra features">
            <div><div class="auth-feature-icon">{ }</div><strong>Beautiful</strong><p>by design</p></div>
            <i></i>
            <div><div class="auth-feature-icon">F</div><strong>Fast</strong><p>by nature</p></div>
            <i></i>
            <div><div class="auth-feature-icon">C</div><strong>Code</strong><p>anywhere</p></div>
          </div>
          <button class="auth-choice" data-auth-social="google" type="button"><span class="google-mark">G</span><strong>Continue with Google</strong></button>
          <button class="auth-choice" data-auth-social="apple" type="button"><span class="apple-mark">A</span><strong>Continue with Apple</strong></button>
          <button class="auth-choice" id="show-email-auth" type="button"><span>@</span><strong>Continue with email</strong></button>
          <form id="desktop-email-auth" class="email-auth" autocomplete="on">
            <div class="email-mode-row">
              <button class="email-mode active" data-auth-mode="signup" type="button">Sign up</button>
              <button class="email-mode" data-auth-mode="login" type="button">Log in</button>
            </div>
            <input id="desktop-auth-name" autocomplete="name" placeholder="Your name" />
            <input id="desktop-auth-email" autocomplete="email" inputmode="email" placeholder="Email address" />
            <input id="desktop-auth-password" autocomplete="new-password" placeholder="Password" type="password" />
            <p id="desktop-auth-error" class="auth-error"></p>
            <button id="desktop-auth-submit" class="email-submit" type="submit">Create account</button>
          </form>
          <div class="auth-legal">
            <p>By continuing, you agree to our</p>
            <div><button type="button" data-auth-link="privacy">Privacy Policy</button><span></span><button type="button" data-auth-link="terms">Terms of Service</button></div>
          </div>
        </div>
      </div>
    </section>
    <div class="app">
      <aside class="rail">
        <div class="rail-logo"><span><img src="/app-assets/vibyra.png" alt="" /></span><strong>Vibyra</strong></div>
        <nav id="rail-nav" class="nav" aria-label="Main navigation"></nav>
        <div id="rail-status" class="rail-status"><span class="dot offline"></span><span>Waiting</span></div>
      </aside>
      <main class="main">
        <header class="topbar" id="topbar"></header>
        <section id="content" class="content"></section>
      </main>
    </div>
    <nav id="mobile-dock" class="mobile-dock" aria-label="Mobile navigation"></nav>
    <div id="pair-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="pair-title">
      <section class="modal">
        <div class="modal-header">
          <div><p class="kicker">Phone pairing</p><h2 id="pair-title" class="page-title">Pair phone</h2></div>
          <button id="close-pair" class="icon-button" type="button" aria-label="Close pairing modal"></button>
        </div>
        <div id="pair-modal-body"></div>
      </section>
    </div>
    <div id="token-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="token-title">
      <section class="modal">
        <div class="modal-header">
          <div><p class="kicker">Membership</p><h2 id="token-title" class="page-title">Token balance</h2></div>
          <button id="close-token" class="icon-button" type="button" aria-label="Close token modal"></button>
        </div>
        <div id="token-modal-body"></div>
      </section>
    </div>
    <script src="/desktop/assets/app.2.js"></script>
    <script src="/desktop/assets/app.1.js"></script>
    <script src="/desktop/assets/app.auth.js"></script>
  </body>
</html>
